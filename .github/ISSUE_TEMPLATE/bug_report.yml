name: Bug Report
description: Report a bug or unexpected behavior in Sapphics Audio Library
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much detail as possible so we can reproduce and fix the issue.

  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      description: Which version of Sapphics Audio Library are you using?
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version
      placeholder: "e.g. 1.21.1"
    validations:
      required: true

  - type: input
    id: fabric-loader
    attributes:
      label: Fabric Loader Version
      placeholder: "e.g. 0.18.5"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Client only
        - Server only
        - Both client and server
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Load the mod with ...
        2. Call SapphicsAudioAPI...
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Crash Report / Log Output
      description: Paste any relevant crash reports or log output here.
      render: text

  - type: textarea
    id: mods-list
    attributes:
      label: Other Mods Installed
      description: List any other mods that may be relevant.
      placeholder: "e.g. Fabric API 0.116.9+1.21.1, ..."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help us diagnose the issue.
